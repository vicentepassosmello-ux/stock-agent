services:
  - type: worker
    name: stock-signal-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python src/agent.py
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: CAPITAL
        value: "200"
      - key: TICKERS
        value: "NVDA,TSLA,AMD,PLTR,COIN,SMCI,MSTR,RKLB"
      - key: SCAN_INTERVAL_MIN
        value: "30"
      - key: PYTHON_VERSION
        value: "3.12.0"
